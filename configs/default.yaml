project:
  name: "chinese-long-answer-eval"
  output_dir: "./outputs"

data:
  test_set: "path/to/test_set.jsonl"
  model_outputs:
    base: "path/to/base_outputs.jsonl"
  answer_key: ""
  human_annotations: null
  prompt_id_field: "prompt_id"
  response_field: "response"
  category_field: "category"

eval:
  modes: ["pairwise", "single"]
  baseline: "base"
  candidates: []
  dimensions:
    - format
    - structure
    - repetition
    - info_quality
    - naturalness
    - task_completion

judge:
  primary: "MiniMax-Text-01"
  api_base: "https://api.minimax.chat/v1"
  temperature: 0.0
  prompt_template: "configs/judge_prompts/unified_zh.txt"
  concurrency: 5
  max_tokens: 4096

consistency:
  num_rounds: 3
  temperatures: [0.0, 0.05, 0.1]
  variance_threshold: 1.5
  aggregation: "median"

stats:
  trimmed_ratio: 0.1
  bootstrap_n: 1000
  confidence_level: 0.95
  hypothesis_tests: ["wilcoxon", "sign_test"]

anomaly:
  common_anomaly_threshold: 2.0
  length_percentile: [5, 95]
  ngram_repeat_threshold: 0.3
  judge_disagreement_threshold: 2

long_answer:
  ngram_sizes: [3, 4, 5]
  template_endings:
    - "总之"
    - "综上所述"
    - "希望以上内容对你有所帮助"
    - "以上就是"
  half_split_ratio: 0.5

report:
  formats: ["markdown", "csv"]
  charts: true
  language: "zh"
