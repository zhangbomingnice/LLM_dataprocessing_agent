project:
  name: "full-suite-eval"
  output_dir: "./outputs/full"

eval:
  modes: ["if_eval", "pairwise", "long_answer"]

judge:
  primary: "MiniMax-Text-01"
  blind_ab: true
  swap_ratio: 0.5
  aggregation: "majority_vote"

stats:
  trimmed_ratio: 0.1
  bootstrap_n: 1000

report:
  formats: ["markdown", "csv"]
  charts: true
