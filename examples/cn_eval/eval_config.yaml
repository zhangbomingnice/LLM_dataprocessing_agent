project:
  name: "demo-eval"
  output_dir: "./outputs/demo"

data:
  test_set: "examples/cn_eval/test_set.jsonl"
  model_outputs:
    base: "examples/cn_eval/base_outputs.jsonl"
    v2: "examples/cn_eval/candidate_outputs.jsonl"

eval:
  modes: ["pairwise", "single"]
  baseline: "base"
  candidates: ["v2"]

judge:
  primary: "MiniMax-Text-01"
  api_base: "https://api.minimax.chat/v1"
  prompt_template: "configs/judge_prompts/unified_zh.txt"
  concurrency: 3
  temperature: 0.0

consistency:
  num_rounds: 3
  temperatures: [0.0, 0.05, 0.1]

report:
  formats: ["markdown", "csv"]
  charts: true
